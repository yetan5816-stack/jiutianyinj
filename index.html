<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司官网</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      color: #222;
      background: #f5f7fa;
      line-height: 1.7;
    }

    header {
      padding: 90px 20px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #16325c, #2867a8);
    }

    header h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    header p {
      margin: 0;
      font-size: 18px;
      opacity: 0.9;
    }

    main {
      width: min(1000px, 92%);
      margin: 40px auto;
    }

    section {
      margin-bottom: 24px;
      padding: 32px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
    }

    h2 {
      margin-top: 0;
      color: #16325c;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .service {
      padding: 20px;
      border-radius: 12px;
      background: #eef5fc;
    }

    .contact a {
      color: #2867a8;
      text-decoration: none;
    }

    footer {
      padding: 25px;
      text-align: center;
      color: #777;
    }
  </style>
</head>

<body>
  <header>
    <h1>XX有限公司</h1>
    <p>专业、可靠、高效的服务解决方案</p>
  </header>

  <main>
    <section>
      <h2>公司介绍</h2>
      <p>
        XX有限公司专注于相关行业服务，致力于为客户提供专业、
        稳定和高质量的解决方案。
      </p>
    </section>

    <section>
      <h2>业务范围</h2>

      <div class="services">
        <div class="service">
          <h3>业务一</h3>
          <p>在这里介绍公司的第一项主要业务。</p>
        </div>

        <div class="service">
          <h3>业务二</h3>
          <p>在这里介绍公司的第二项主要业务。</p>
        </div>

        <div class="service">
          <h3>业务三</h3>
          <p>在这里介绍公司的第三项主要业务。</p>
        </div>
      </div>
    </section>

    <section class="contact">
      <h2>联系我们</h2>
      <p>电话：123-4567-8900</p>
      <p>地址：江苏省南京市</p>
      <p>邮箱：example@company.com</p>
    </section>
  </main>

  <footer>
    © 2026 XX有限公司 版权所有
  </footer>
</body>
</html>
